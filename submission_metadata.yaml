# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for architecture discussion, code review, and pair
  implementation throughout. All rubric content was human-reviewed line by line
  and frozen. No candidate data was fed to any LLM at rank time — ranking is a
  deterministic, offline, vectorized weighted sum with no network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A JD-understanding layer, not keyword matching. A frozen, human-reviewed rubric
  (rubric.yaml) encodes the role's must-haves, nice-to-haves, disqualifiers, and
  consistency rules. Two stages: an offline build extracts ~42 raw signals per
  candidate (structured features + a TF-IDF semantic similarity to a JD reference)
  into features.parquet; the rank-time scorer applies rubric weights as a
  vectorized weighted sum (base_fit x behavioral - penalties), takes the top 100,
  and attaches deterministic, fact-grounded reasoning. The decisive signal is
  skill-title-career coherence: in this pool keyword stuffers outnumber
  corroborated candidates ~10:1, so corroborated title-match is weighted far above
  raw skill tags. Honeypots are caught by high-precision internal-consistency rules
  (role months > total career; expert proficiency with ~0 months used) applied as a
  hard floor. Runs on CPU in ~110s end-to-end, no network. Subset NDCG@10 0.9968;
  top-100 honeypot rate 0%.

